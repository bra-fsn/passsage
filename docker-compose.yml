services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - SERVICES=s3
      - DEBUG=0
    volumes:
      - localstack-data:/var/lib/localstack
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  foundationdb:
    image: foundationdb/foundationdb:7.3.63
    ports:
      - "4500:4500"
    environment:
      - FDB_NETWORKING_MODE=container
      - FDB_COORDINATOR_PORT=4500
    volumes:
      - fdb-data:/var/fdb/data
      - fdb-config:/var/fdb/shared
    healthcheck:
      test: ["CMD-SHELL", "fdbcli --exec 'configure new single ssd' >/dev/null 2>&1; cp -f /var/fdb/fdb.cluster /var/fdb/shared/fdb.cluster 2>/dev/null; fdbcli --exec 'status minimal' 2>/dev/null | grep -q 'The database is available'"]
      interval: 5s
      timeout: 10s
      retries: 20

  xs3lerator:
    image: ghcr.io/bra-fsn/xs3lerator:${XS3LERATOR_TAG:-latest}
    pull_policy: always
    ports:
      - "${XS3_PORT:-8888}:8080"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - XS3_S3_BUCKET=proxy-cache
      - XS3_S3_ENDPOINT=http://localstack:4566
      - XS3_S3_REGION=${AWS_DEFAULT_REGION:-us-west-2}
      - XS3_CACHE_DIR=/var/cache/xs3lerator
      - XS3_UPSTREAM_TLS_SKIP_VERIFY=true
      - XS3_FDB_CLUSTER_FILE=/var/fdb/shared/fdb.cluster
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-west-2}
      - AWS_ALLOW_HTTP=true
    volumes:
      - xs3lerator-cache:/var/cache/xs3lerator
      - fdb-config:/var/fdb/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      localstack:
        condition: service_healthy
      foundationdb:
        condition: service_healthy

  passsage:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PROXY_PORT:-8080}:8080"
      - "${HEALTH_PORT:-8082}:8082"
    environment:
      - PASSSAGE_ALLOW_POLICY_HEADER=${PASSSAGE_ALLOW_POLICY_HEADER:-1}
      - PASSSAGE_DEBUG_PROXY=${PASSSAGE_DEBUG_PROXY:-}
      - PASSSAGE_XS3LERATOR_URL=http://xs3lerator:8080
      - PASSSAGE_S3_HASH_PREFIX_DEPTH=4
      - PASSSAGE_HEALTH_PORT=8082
      - PASSSAGE_HEALTH_HOST=0.0.0.0
      - PASSSAGE_FDB_CLUSTER_FILE=/var/fdb/shared/fdb.cluster
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-west-2}
      - S3_ENDPOINT_URL=http://localstack:4566
      - S3_BUCKET=proxy-cache
    volumes:
      - fdb-config:/var/fdb/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      localstack:
        condition: service_healthy
      foundationdb:
        condition: service_healthy
      xs3lerator:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  localstack-data:
  xs3lerator-cache:
  fdb-data:
  fdb-config:
